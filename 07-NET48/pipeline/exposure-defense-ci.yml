name: Exposure Defense CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  defense-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 07-NET48
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ./Atelier07.slnx

      - name: Build
        run: dotnet build ./Atelier07.slnx --no-restore

      - name: Test
        run: dotnet test ./Atelier07.slnx --no-build --verbosity normal



