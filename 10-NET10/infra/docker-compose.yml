version: "3.9"

services:
  reverse-proxy:
    image: nginx:stable
    ports:
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /src
    volumes:
      - ../PerimeterValidationLab:/src
    command: ["dotnet", "run", "--urls", "http://0.0.0.0:5000"]
