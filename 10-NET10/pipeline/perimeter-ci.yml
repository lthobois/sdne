name: Perimeter Validation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  perimeter-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 10-NET10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ./Atelier10.slnx

      - name: Build
        run: dotnet build ./Atelier10.slnx --no-restore

      - name: Test
        run: dotnet test ./Atelier10.slnx --no-build --verbosity normal



