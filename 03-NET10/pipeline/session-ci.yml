name: Workshop 03 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  workshop-03-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03-NET10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ./Atelier03.slnx

      - name: Build
        run: dotnet build ./Atelier03.slnx --no-restore

      - name: Test
        run: dotnet test ./Atelier03.slnx --no-build --verbosity normal