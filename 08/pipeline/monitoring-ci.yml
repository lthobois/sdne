name: Monitoring Security CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  monitoring-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 08
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ./Atelier08.slnx

      - name: Build
        run: dotnet build ./Atelier08.slnx --no-restore

      - name: Test
        run: dotnet test ./Atelier08.slnx --no-build --verbosity normal
